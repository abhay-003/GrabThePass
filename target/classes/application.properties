spring.application.name=bookTicket

# 1. Database Connection URL (Replace 'book_ticket_db' with your actual schema name)
spring.datasource.url=jdbc:mysql://localhost:3306/GrabThePass?createDatabaseIfNotExist=true

# 2. Database Username & Password (Replace with your local MySQL credentials)
spring.datasource.username=spring
spring.datasource.password=password

# 3. MySQL Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Hibernate / JPA Settings
# 'update' automatically updates your database tables if you change your Java @Entity classes
spring.jpa.hibernate.ddl-auto=update

# 5. Show SQL (Optional but highly recommended for debugging)
# This prints the actual SQL queries Hibernate writes for you into the console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 6. Database Dialect (Tells Hibernate exactly what flavor of SQL to speak)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect